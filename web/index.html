<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PK Management web cabinet for castings, profiles, selections, chats and admin tools.">
  <meta name="theme-color" content="#1F1F1F">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PK Management">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PK Management</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body { height: 100%; margin: 0; background: #e7e7e7; }
    #app-loading {
      align-items: center;
      color: #252525;
      display: flex;
      font: 600 14px/1.4 Arial, sans-serif;
      inset: 0;
      justify-content: center;
      letter-spacing: 1.2px;
      position: fixed;
    }
    #app-loading::before {
      animation: loading-pulse 1s ease-in-out infinite alternate;
      background: #be0000;
      border-radius: 50%;
      content: '';
      height: 12px;
      margin-right: 12px;
      width: 12px;
    }
    @keyframes loading-pulse { to { opacity: .28; transform: scale(.82); } }
  </style>
</head>
<body>
  <div id="app-loading" role="status" aria-live="polite">PK MANAGEMENT ЗАГРУЖАЕТСЯ</div>
  <script>
    const loadingObserver = new MutationObserver(() => {
      if (document.querySelector('flutter-view')) {
        document.getElementById('app-loading')?.remove();
        loadingObserver.disconnect();
      }
    });
    loadingObserver.observe(document.body, { childList: true, subtree: true });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
